services:
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - signaling
      - ai-engine
    restart: unless-stopped

  signaling:
    build:
      context: ../server/signaling
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AI_ENGINE_URL=ws://ai-engine:8000/ws/audio
    restart: unless-stopped

  ai-engine:
    build:
      context: ../server/ai-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
